name: CI

on:
  push:
  pull_request:

jobs:
  package:
    name: Package (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck example-express
        if: matrix.node-version == 18
        run: pnpm --filter example-express typecheck

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        if: matrix.node-version == 18
        run: pnpm test

      - name: Test coverage
        if: matrix.node-version == 20
        run: pnpm test:coverage

      - name: Packaged consumer smoke test
        run: pnpm smoke:consumer

  cloudflare-workers-smoke:
    name: Cloudflare Workers Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cloudflare Worker smoke test
        run: pnpm smoke:cloudflare-worker

  bun-smoke:
    name: Bun Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bun packaged consumer smoke test
        run: pnpm smoke:bun

  example-next:
    name: Example Next.js (Node 20.9+)
    runs-on: ubuntu-latest
    env:
      APP_BASE_URL: http://localhost:3000
      CREEM_API_KEY: ci_creem_api_key
      CREEM_PRODUCT_ID: ci_product_id
      CREEM_TEST_MODE: "true"
      CREEM_WEBHOOK_SECRET: ci_webhook_secret
      DATAFAST_API_KEY: ci_datafast_api_key
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20.9.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Typecheck example-next
        run: pnpm --filter example-next typecheck

      - name: Build example-next
        run: pnpm --filter example-next build
